<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background: rounded square with warm gradient -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
    <linearGradient id="sun" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="wave" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0284C7" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Sun rays (thin elegant) -->
  <line x1="16" y1="3.5" x2="16" y2="6.5" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="22.5" y1="5.7" x2="20.9" y2="7.3" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24.5" y1="11.5" x2="22" y2="12.2" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9.5" y1="5.7" x2="11.1" y2="7.3" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="7.5" y1="11.5" x2="10" y2="12.2" stroke="#FCD34D" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Sun body -->
  <circle cx="16" cy="12" r="5" fill="url(#sun)"/>

  <!-- Sea / horizon waves -->
  <path d="M4 21 Q8 19 12 21 Q16 23 20 21 Q24 19 28 21 L28 28 L4 28 Z" fill="url(#wave)" opacity="0.85"/>
  <path d="M4 23.5 Q9 21.5 14 23.5 Q19 25.5 24 23.5 Q26 22.5 28 23.5" stroke="#BAE6FD" stroke-width="0.8" fill="none" stroke-linecap="round" opacity="0.7"/>

  <!-- "S" letter subtle mark (Serramar brand) -->
  <text x="16" y="27.5" text-anchor="middle" font-family="Georgia,serif" font-size="5" font-weight="700" fill="white" opacity="0.9" letter-spacing="0.5">SS</text>
</svg>
